name: Update Requirements

on:
  push:
    branches:
      - main
    paths:
      - requirements.in

jobs:
  update-requirements:
    runs-on: ubuntu-latest
    # Run every step inside the same devcontainer image used locally, so the
    # OS, Python build, and system libraries match your Docker dev environment.
    container:
      image: mcr.microsoft.com/devcontainers/python:3.11
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # actions/setup-python is not needed — the container already has Python 3.11.
      # Cache key includes 'devcontainer' to avoid collisions with any old ubuntu runner caches.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-devcontainer-pip-${{ hashFiles('requirements.in') }}
          restore-keys: |
            ${{ runner.os }}-devcontainer-pip-

      - name: Pin pip version
        run: pip install "pip<26"

      - name: Install build tools
        run: pip install pip-tools pipdeptree

      # ── 0. Snapshot old detailed_requirements.txt for new-package diffing ────
      - name: Save previous detailed_requirements.txt
        run: |
          git show HEAD:detailed_requirements.txt > detailed_requirements_old.txt 2>/dev/null \
            || touch detailed_requirements_old.txt

      # ── 1. Compile ────────────────────────────────────────────────────────────
      - name: Run pip-compile
        id: pip_compile
        run: |
          pip-compile --output-file=detailed_requirements.txt requirements.in \
            2>&1 | tee pip_compile_output.txt
        continue-on-error: true

      # ── 2a. Alert on conflict ─────────────────────────────────────────────────
      - name: Open issue on conflict
        if: steps.pip_compile.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('pip_compile_output.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Requirements conflict detected',
              body: [
                '## Dependency conflict in `requirements.in`',
                '',
                `Triggered by commit ${context.sha} (push by @${context.actor}).`,
                '',
                'pip-compile could not resolve the dependencies. Full output:',
                '',
                '```',
                output,
                '```',
                '',
                'Please fix `requirements.in` and push again.',
              ].join('\n'),
              labels: ['requirements-conflict'],
            });

      - name: Fail on conflict
        if: steps.pip_compile.outcome == 'failure'
        run: |
          echo "pip-compile failed — see the issue opened above."
          exit 1

      # ── 2b. Post-process on success ───────────────────────────────────────────
      - name: Remove self-referential comment lines from detailed_requirements.txt
        run: |
          sed -i '/^    #   -r requirements.in/d' detailed_requirements.txt

      - name: Generate requirements.txt
        run: |
          grep -v "^[[:space:]]*#" detailed_requirements.txt \
            | grep -v "^[[:space:]]*$" \
            | sed 's/\[[^]]*\]//g' \
            > requirements.txt

      # ── 3. Audit ──────────────────────────────────────────────────────────────
      - name: Run requirements audit
        id: audit
        run: |
          python scripts/audit_requirements.py \
            --detailed  detailed_requirements.txt \
            --req-in    requirements.in \
            --old-detailed detailed_requirements_old.txt \
            --orphan-out   orphan_report.txt \
            --new-pkg-out  new_packages_report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # ── 4. Install + smoke test ───────────────────────────────────────────────
      - name: Install compiled packages
        run: pip install -r requirements.txt

      - name: Run kedro smoke tests
        id: smoke_test
        run: |
          pytest tests/smoke/ -v 2>&1 | tee smoke_test_output.txt
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # ── 5. Reverse dependency tree ────────────────────────────────────────────
      - name: Generate reverse_dependency.txt
        run: |
          grep -v "^#" requirements.txt \
            | grep -v "^$" \
            | cut -d'=' -f1 \
            | xargs -I {} sh -c \
                'echo "=== {} ===" && pipdeptree --reverse --packages {} 2>/dev/null && echo ""' \
            > reverse_dependency.txt

      # ── 6. Assemble PR body ───────────────────────────────────────────────────
      - name: Generate PR body
        run: |
          python scripts/generate_pr_body.py \
            --sha           "${{ github.sha }}" \
            --orphan-report orphan_report.txt \
            --new-pkg-report new_packages_report.txt \
            --smoke-output  smoke_test_output.txt \
            --smoke-exit    "${{ steps.smoke_test.outputs.exit_code || '0' }}" \
            --out           pr_body.md

      # ── 7. Open PR ────────────────────────────────────────────────────────────
      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          branch: auto/update-requirements
          base: main
          commit-message: "chore: regenerate requirements files"
          title: "chore: update requirements files from requirements.in changes"
          body-path: pr_body.md
          delete-branch: true
          labels: |
            requirements-update
